name: CI

on: [push, pull_request]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check
        run: python -m py_compile $(find warehouse_binning -name "*.py")
      # This is a sanity check only, not real test coverage. Real tests need
      # a running bench (frappe + erpnext + MariaDB) — wire up frappe_docker's
      # test workflow once you have CI minutes to spend on it:
      # https://github.com/frappe/frappe_docker
