<!DOCTYPE html>
<!--
  Warehouse Binning — Technician Scanning Interface
  ==================================================
  Three views in one page: Putaway (receive-to-bin), Pick (issue-from-bin),
  and Lookup (traceability). Designed for mobile/tablet use with barcode
  scanner input — all scan fields auto-submit on Enter.

  Auth: relies on Frappe's session handling. Accessible to any logged-in
  user with Stock User / Stock Manager / Warehouse Technician role.

  The Warehouse Technician role is shipped with this app and has no Desk
  access — only the scanning UI. Assign it to floor staff via Role Profile
  or User > Roles in the Desk.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="csrf-token" content="{{ csrf_token }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
<title>Warehouse Scan</title>
<style>
  /* ===================== Reset & Variables ===================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #16a34a;
    --green-bg: #dcfce7;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --blue: #2563eb;
    --blue-bg: #dbeafe;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --white: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    color: var(--gray-900);
    background: var(--gray-100);
    -webkit-font-smoothing: antialiased;
  }

  /* ===================== Layout ===================== */
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--gray-900);
    color: var(--white);
    flex-shrink: 0;
    min-height: 52px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-badge {
    font-size: 12px;
    background: var(--blue);
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .header-badge.offline {
    background: var(--amber);
  }
  .header-badge.syncing {
    background: var(--blue);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .6; }
  }
  .header-badge.queue-count {
    background: var(--red);
    margin-left: 4px;
  }

  /* Main content area */
  .main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px 16px;
    background: var(--gray-50);
  }

  /* ===================== Bottom Tab Bar ===================== */
  .tab-bar {
    display: flex;
    flex-shrink: 0;
    border-top: 1px solid var(--gray-200);
    background: var(--white);
    padding-bottom: var(--safe-bottom);
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-400);
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s;
  }
  .tab-btn .tab-icon { font-size: 22px; line-height: 1; }
  .tab-btn.active { color: var(--blue); }
  .tab-btn:active { opacity: .7; }

  /* ===================== Panels ===================== */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ===================== Cards ===================== */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    border-bottom: 1px solid var(--gray-100);
    transition: background .1s;
  }
  .card-header:active { background: var(--gray-50); }
  .card-header .title { font-weight: 600; font-size: 15px; color: var(--gray-800); }
  .card-header .sub {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 1px;
  }
  .card-header .chevron {
    font-size: 16px;
    color: var(--gray-400);
    transition: transform .2s;
  }
  .card-header.open .chevron { transform: rotate(180deg); }

  .card-body { padding: 0 14px 14px; }
  .card-body.collapsed { display: none; }

  /* ===================== Status Badges ===================== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-pending    { background: var(--gray-100); color: var(--gray-600); }
  .badge-partial    { background: var(--amber-bg);  color: var(--amber); }
  .badge-completed  { background: var(--green-bg);  color: var(--green); }
  .badge-scanned    { background: var(--green-bg);  color: var(--green); }
  .badge-unscanned  { background: var(--red-bg);    color: var(--red); }
  .badge-draft      { background: var(--blue-bg);   color: var(--blue); }
  .badge-ok         { background: var(--green-bg);  color: var(--green); }
  .badge-low        { background: var(--red-bg);    color: var(--red); }

  /* ===================== Item Rows ===================== */
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .item-row:last-child { border-bottom: none; }

  .item-info { flex: 1; min-width: 0; }
  .item-info .item-code {
    font-weight: 600;
    font-size: 14px;
    color: var(--gray-800);
  }
  .item-info .item-name {
    font-size: 12px;
    color: var(--gray-500);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-info .item-meta {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 2px;
  }
  .item-info .item-meta strong { color: var(--gray-700); }

  .item-qty {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-800);
    text-align: right;
    white-space: nowrap;
  }
  .item-qty .uom { font-size: 11px; font-weight: 400; color: var(--gray-400); }

  .item-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  /* ===================== Buttons ===================== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all .12s;
    min-height: 44px;
    min-width: 44px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--blue); color: var(--white); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-success { background: var(--green); color: var(--white); }
  .btn-success:hover { background: #15803d; }
  .btn-outline {
    background: var(--white);
    color: var(--gray-700);
    border: 1.5px solid var(--gray-300);
  }
  .btn-outline:hover { border-color: var(--gray-400); }
  .btn-sm {
    font-size: 12px;
    padding: 6px 12px;
    min-height: 32px;
  }
  .btn-icon {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    font-size: 18px;
  }
  .btn-full { width: 100%; }

  /* ===================== Scan Input ===================== */
  .scan-field {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .scan-field input {
    flex: 1;
    font-family: var(--font);
    font-size: 15px;
    padding: 10px 12px;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-sm);
    outline: none;
    background: var(--white);
    min-height: 44px;
    transition: border-color .15s;
  }
  .scan-field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-bg);
  }
  .scan-field input::placeholder { color: var(--gray-400); }

  /* ===================== Lookup Results ===================== */
  .lookup-result {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .lookup-result table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .lookup-result th {
    background: var(--gray-50);
    text-align: left;
    padding: 8px 10px;
    font-weight: 600;
    color: var(--gray-600);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--gray-200);
  }
  .lookup-result td {
    padding: 10px;
    border-bottom: 1px solid var(--gray-100);
    color: var(--gray-700);
  }
  .lookup-result tr:last-child td { border-bottom: none; }
  .lookup-result .bin-link {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
  }
  .lookup-result .bin-link:hover { text-decoration: underline; }
  .lookup-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
  }
  .lookup-empty .icon { font-size: 40px; margin-bottom: 8px; }

  /* ===================== Search Bar ===================== */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .search-bar input {
    flex: 1;
    font-family: var(--font);
    font-size: 15px;
    padding: 10px 12px;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-sm);
    outline: none;
    background: var(--white);
    min-height: 44px;
    transition: border-color .15s;
  }
  .search-bar input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-bg);
  }

  /* ===================== Loading & Empty ===================== */
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
  }
  .loading .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
  .empty-state .text { font-size: 14px; }

  /* ===================== Notification Toast ===================== */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--gray-900);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    max-width: calc(100% - 32px);
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  /* ===================== Progress ===================== */
  .progress-bar {
    height: 4px;
    background: var(--gray-200);
    border-radius: 2px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width .3s;
  }
  .progress-bar .fill.complete { background: var(--green); }

  /* ===================== Section Titles ===================== */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-500);
    margin: 16px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }

  /* ===================== Empty scan state within a card ===================== */
  .scan-prompt {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    color: var(--gray-500);
    font-size: 13px;
  }
  .scan-prompt .icon { font-size: 18px; }

  /* ===================== Responsive for desktop ===================== */
  @media (min-width: 768px) {
    .app { max-width: 600px; border-radius: 12px; margin: 20px auto; height: calc(100% - 40px); box-shadow: var(--shadow-lg); }
    body { background: var(--gray-200); }
  }

  /* ===================== Scan Highlight Animation ===================== */
  @keyframes flash-green {
    0%   { background: var(--green-bg); }
    100% { background: transparent; }
  }
  .scan-flash {
    animation: flash-green .6s ease-out;
  }

  /* Barcode scanner full-width input mode */
  .scanner-mode .scan-field input {
    font-size: 18px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ========== HEADER ========== -->
  <header class="header">
    <h1>🏭 Warehouse Scan</h1>
    <div style="display:flex;align-items:center;gap:4px">
      <span class="header-badge" id="status-badge">Online</span>
      <span class="header-badge queue-count" id="queue-badge" style="display:none">0</span>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main" id="main">

    <!-- ======== PUTAWAY PANEL ======== -->
    <div class="panel active" id="panel-putaway">
      <div class="section-title">📥 Open Putaway Tasks</div>
      <div id="putaway-list"></div>
      <div class="empty-state" id="putaway-empty" style="display:none">
        <div class="icon">✅</div>
        <div class="text">No open putaway tasks</div>
      </div>
      <div class="loading" id="putaway-loading">
        <div class="spinner"></div>
        <div>Loading tasks…</div>
      </div>
    </div>

    <!-- ======== PICK PANEL ======== -->
    <div class="panel" id="panel-pick">
      <div class="section-title">📤 Pending Pick Tasks</div>
      <div class="search-bar" style="margin-bottom:12px">
        <input type="text" id="pick-warehouse" placeholder="Filter by warehouse…" autocomplete="off" style="flex:1;font-family:var(--font);font-size:14px;padding:8px 10px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);outline:none;min-height:40px">
        <button class="btn btn-primary btn-sm" id="pick-filter-btn">Filter</button>
        <button class="btn btn-outline btn-sm" id="pick-clear-btn">Clear</button>
      </div>
      <div id="pick-list"></div>
      <div class="empty-state" id="pick-empty" style="display:none">
        <div class="icon">📋</div>
        <div class="text">No pending pick tasks</div>
      </div>
      <div class="loading" id="pick-loading">
        <div class="spinner"></div>
        <div>Loading pick tasks…</div>
      </div>
    </div>

    <!-- ======== LOOKUP PANEL ======== -->
    <div class="panel" id="panel-lookup">
      <div class="section-title">🔍 Item / Batch Lookup</div>
      <div class="search-bar">
        <input type="text" id="lookup-input" placeholder="Scan or type item code / batch…" autocomplete="off">
        <button class="btn btn-primary btn-sm" id="lookup-btn">Search</button>
      </div>
      <div id="lookup-results"></div>
      <div class="loading" id="lookup-loading" style="display:none">
        <div class="spinner"></div>
        <div>Searching…</div>
      </div>
    </div>

  </main>

  <!-- ========== TAB BAR ========== -->
  <nav class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-panel="putaway">
      <span class="tab-icon">📥</span>
      Putaway
    </button>
    <button class="tab-btn" data-panel="pick">
      <span class="tab-icon">📤</span>
      Pick
    </button>
    <button class="tab-btn" data-panel="lookup">
      <span class="tab-icon">🔍</span>
      Lookup
    </button>
  </nav>

  <!-- ========== TOAST ========== -->
  <div class="toast" id="toast"></div>
</div>

<script>
(function() {
  'use strict';

  /* ============================== State ============================== */
  const STATE = { activePanel: 'putaway' };

  /* ============================== DOM refs ============================== */
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const main         = $('#main');
  const putawayList  = $('#putaway-list');
  const putawayEmpty = $('#putaway-empty');
  const putawayLoad  = $('#putaway-loading');
  const pickList     = $('#pick-list');
  const pickEmpty    = $('#pick-empty');
  const pickLoad     = $('#pick-loading');
  const lookupInput  = $('#lookup-input');
  const lookupBtn    = $('#lookup-btn');
  const lookupRes    = $('#lookup-results');
  const lookupLoad   = $('#lookup-loading');
  const toast        = $('#toast');
  const statusBadge  = $('#status-badge');
  const queueBadge   = $('#queue-badge');

  /* ============================== Toast ============================== */
  let toastTimer = null;
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast' + (type ? ' ' + type : '');
    // force reflow so the transition plays
    void toast.offsetWidth;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  /* ============================== API helpers ============================== */
  // GET for read-only operations — Frappe skips CSRF validation on GET.
  async function call(method, args) {
    var params = buildQueryString(args);
    var url = '/api/method/' + method + params;
    var res = await fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    return handleResponse(res);
  }

  // Build query string from args object, skipping null/undefined/empty
  function buildQueryString(args) {
    if (!args) return '';
    var parts = [];
    for (var k in args) {
      if (Object.prototype.hasOwnProperty.call(args, k) &&
          args[k] !== null && args[k] !== undefined && args[k] !== '') {
        parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(args[k]));
      }
    }
    return parts.length > 0 ? '?' + parts.join('&') : '';
  }

  // Parse JSON fetch response, throw on error
  async function handleResponse(res) {
    if (!res.ok) {
      var msg = 'Request failed: ' + res.status;
      try {
        var err = await res.json();
        msg = err.exception || err.message || msg;
      } catch(_) {}
      throw new Error(msg);
    }
    var data = await res.json();
    return data.message;
  }

  // Get CSRF token from meta tag (rendered by Frappe template engine).
  // Returns empty string if not available.
  function getCsrfToken() {
    var meta = document.querySelector('meta[name="csrf-token"]');
    if (meta) {
      var token = meta.getAttribute('content');
      // Token is a real hash (not raw Jinja) if it doesn't start with {
      if (token && token.charAt(0) !== '{') return token;
    }
    return '';
  }

  // POST for mutation operations. Uses CSRF token if available.
  async function callPost(method, args) {
    var csrfToken = getCsrfToken();
    var headers = {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    };
    if (csrfToken) {
      headers['X-Frappe-CSRF-Token'] = csrfToken;
    }
    var url = '/api/method/' + method;
    var res = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: args ? JSON.stringify(args) : undefined
    });
    return handleResponse(res);
  }

  // Smart mutation: try POST (with CSRF) first. If it fails with CSRF error,
  // fall back to GET (which bypasses CSRF). This handles both cached and
  // uncached page scenarios.
  async function callMutation(method, args) {
    if (!navigator.onLine) {
      await queueScan(method, args);
      return 'queued';
    }
    // Try POST first
    try {
      return await callPost(method, args);
    } catch (err) {
      var msg = err.message || '';
      // If CSRF error (403) or network error, fall back to GET
      if (msg.indexOf('CSRFToken') !== -1 ||
          msg.indexOf('Invalid Request') !== -1 ||
          msg.indexOf('Failed to fetch') !== -1 ||
          msg.indexOf('NetworkError') !== -1 ||
          err.name === 'TypeError') {
        // For network errors, queue
        if (msg.indexOf('Failed to fetch') !== -1 ||
            msg.indexOf('NetworkError') !== -1 ||
            err.name === 'TypeError') {
          await queueScan(method, args);
          return 'queued';
        }
        // For CSRF errors, retry via GET
        console.log('CSRF token unavailable, falling back to GET for', method);
        try {
          return await call(method, args);
        } catch (getErr) {
          var getMsg = getErr.message || '';
          if (getMsg.indexOf('Failed to fetch') !== -1 ||
              getMsg.indexOf('NetworkError') !== -1) {
            await queueScan(method, args);
            return 'queued';
          }
          throw getErr;
        }
      }
      throw err;
    }
  }



  /* ============================== Tab Switching ============================== */
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = btn.dataset.panel;
      if (panel === STATE.activePanel) return;
      STATE.activePanel = panel;

      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      $$('.panel').forEach(p => p.classList.remove('active'));
      const panelEl = $('#panel-' + panel);
      if (panelEl) panelEl.classList.add('active');

      // Load data when tab is activated
      if (panel === 'putaway') loadPutawayTasks();
      else if (panel === 'pick') loadPickTasks();
      else if (panel === 'lookup') { lookupInput.focus(); }
    });
  });

  /* ============================== Putaway ============================== */
  async function loadPutawayTasks() {
    putawayList.innerHTML = '';
    putawayEmpty.style.display = 'none';
    putawayLoad.style.display = '';

    try {
      const tasks = await call('warehouse_binning.api.get_open_putaway_tasks');
      putawayLoad.style.display = 'none';

      if (!tasks || tasks.length === 0) {
        putawayEmpty.style.display = '';
        return;
      }

      let html = '';
      for (const task of tasks) {
        html += renderPutawayCard(task);
      }
      putawayList.innerHTML = html;

      // Attach click handlers for card headers
      putawayList.querySelectorAll('.card-header').forEach(hdr => {
        hdr.addEventListener('click', () => {
          const body = hdr.nextElementSibling;
          if (!body) return;
          hdr.classList.toggle('open');
          body.classList.toggle('collapsed');

          // Lazy-load details if not loaded yet
          if (!body.classList.contains('collapsed') && body.dataset.loaded !== 'true') {
            const taskName = hdr.dataset.task;
            loadPutawayDetail(taskName, body);
          }
        });
      });
    } catch (err) {
      putawayLoad.style.display = 'none';
      showToast('Error: ' + err.message, 'error');
    }
  }

    const statusClass = task.status === 'Completed' ? 'badge-completed'

      <div class="card">
        <div class="card-header" data-task="${escHtml(task.name)}">
          <div>
            <div class="title">${escHtml(task.name)}</div>
            <div class="sub">${escHtml(task.warehouse)} · ${task.posting_date || ''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge ${statusClass}">${task.status}</span>
            <span class="chevron">▾</span>

          <div class="loading" style="padding:20px 0">
            <div class="spinner"></div>
          </div>

  /* ============================== Scan Dialog ============================== */
  function showScanDialog(opts) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
      display:flex;align-items:center;justify-content:center;padding:20px;
    `;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

    const dialog = document.createElement('div');
    dialog.style.cssText = `
      background:var(--white);border-radius:14px;padding:24px;width:100%;
      max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);
    `;

    const title = opts.type === 'putaway' ? 'Scan Putaway Bin' : 'Scan Pick Confirmation';
    const isPutaway = opts.type === 'putaway';
    const pendingQty = Number(opts.pendingQty || opts.qty || 0);

    dialog.innerHTML = `
      <h3 style="font-size:18px;font-weight:600;margin-bottom:4px">${title}</h3>
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:16px">
        ${escHtml(opts.itemCode)} · Batch: ${escHtml(opts.batchNo || '—')}
        ${isPutaway ? ' · Remaining: <strong>' + pendingQty + '</strong>' : ''}
      </p>
      ${isPutaway ? `
      <div class="scan-field" style="margin-bottom:10px">
        <input type="number" id="scan-dialog-qty"
          value="${pendingQty}" min="0.01" step="any"
          autocomplete="off"
          style="flex:1;font-family:var(--font);font-size:16px;padding:12px;
            border:2px solid var(--gray-200);border-radius:8px;outline:none;width:120px;">
        <span style="font-size:14px;color:var(--gray-500);font-weight:500">qty to bin →</span>
      </div>` : ''}
      <div class="scan-field" style="margin-bottom:14px">
        <input type="text" id="scan-dialog-input"
          placeholder="${isPutaway ? 'Scan or type bin code…' : 'Confirm bin code…'}"
          autocomplete="off"
          style="flex:1;font-family:var(--font);font-size:16px;padding:12px;
            border:2px solid var(--gray-200);border-radius:8px;outline:none;">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" id="scan-dialog-cancel" style="flex:1">Cancel</button>
        <button class="btn btn-primary" id="scan-dialog-confirm" style="flex:1">Confirm</button>
      </div>
    `;

    overlay.appendChild(dialog);
    document.body.appendChild(overlay);

    const binInput = dialog.querySelector('#scan-dialog-input');
    const qtyInput = dialog.querySelector('#scan-dialog-qty');

    function close() {
      document.body.removeChild(overlay);
    }

    function submit() {
      const binCode = binInput.value.trim();
      if (!binCode) { binInput.style.borderColor = 'var(--red)'; return; }

      var scanQty = pendingQty;
      if (qtyInput) {
        var parsed = parseFloat(qtyInput.value);
        if (isNaN(parsed) || parsed <= 0) {
          qtyInput.style.borderColor = 'var(--red)';
          return;
        }
        if (parsed > pendingQty) {
          showToast('Qty cannot exceed ' + pendingQty, 'error');
          return;
        }
        scanQty = parsed;
      }

      if (opts.type === 'putaway') {
        submitPutawayScan(opts.taskName, opts.rowName, binCode, scanQty, opts.batchNo, opts.buttonEl, close);
      } else if (opts.type === 'pick') {
        submitPickScan(opts.taskName, opts.rowName, opts.itemCode, opts.batchNo, opts.binLocation, binCode, opts.buttonEl, close);
      }
    }

    binInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submit(); }
    });
    if (qtyInput) {
      qtyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); binInput.focus(); }
      });
    }
    dialog.querySelector('#scan-dialog-cancel').addEventListener('click', close);
    dialog.querySelector('#scan-dialog-confirm').addEventListener('click', submit);

    // Auto-focus: qty first for putaway, bin code for pick
    if (qtyInput) setTimeout(() => qtyInput.focus(), 100);
    else setTimeout(() => binInput.focus(), 100);
  }

  async function submitPutawayScan(taskName, rowName, binCode, scanQty, batchNo, buttonEl, close) {
    buttonEl.disabled = true;
    buttonEl.textContent = '…';

    try {
      const result = await callMutation('warehouse_binning.api.scan_putaway_item', {
        task_name: taskName,
        row_name: rowName,
        actual_bin: binCode,
        qty: scanQty,
        batch_no: batchNo || undefined
      });

      if (result === 'queued') {
        showToast('📦 Queued — will sync when online', 'success');
        buttonEl.textContent = '⏳';
      } else {
        showToast('✓ ' + scanQty + ' scanned to ' + binCode, 'success');
      }
      close();
      setTimeout(() => loadPutawayTasks(), 300);
    } catch (err) {
      buttonEl.disabled = false;
      buttonEl.textContent = 'Scan Bin';
      showToast('✗ ' + err.message, 'error');
    }
  }

  /* ============================== Offline Queue (IndexedDB) ============================== */
  const DB_NAME = 'warehouse_binning_queue';
  const DB_VERSION = 1;
  const STORE_NAME = 'scans';

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, {
            keyPath: 'id',
            autoIncrement: true
          });
        }
      };
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async function queueScan(method, args) {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.add({
      method: method,
      args: args,
      timestamp: Date.now(),
      retries: 0
    });
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = (e) => reject(e.target.error);
    });
    db.close();
    await updateQueueBadge();
  }

  async function getQueuedScans() {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const all = await new Promise((resolve, reject) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
    db.close();
    return all;
  }

  async function removeScan(id) {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.delete(id);
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = (e) => reject(e.target.error);
    });
    db.close();
    await updateQueueBadge();
  }

  async function updateQueueBadge() {
    try {
      const all = await getQueuedScans();
      if (all.length > 0) {
        queueBadge.textContent = all.length;
        queueBadge.style.display = '';
      } else {
        queueBadge.style.display = 'none';
      }
    } catch (_) {
      queueBadge.style.display = 'none';
    }
  }

  async function processQueue() {
    try {
      const all = await getQueuedScans();
      if (all.length === 0) return;

      statusBadge.textContent = 'Syncing';
      statusBadge.className = 'header-badge syncing';

      let processed = 0;
      for (const item of all) {
        try {
          await call(item.method, item.args);
          await removeScan(item.id);
          processed++;
        } catch (err) {
          // If it's still a network error, stop processing and wait
          if (err.message.includes('Failed to fetch') ||
              err.message.includes('NetworkError') ||
              err.message.includes('NetworkError when attempting to fetch')) {
            break;
          }
          // Otherwise remove invalid entries (e.g. 404, bad request)
          await removeScan(item.id);
          processed++;
        }
      }

      await updateQueueBadge();

      if (processed > 0) {
        showToast('✓ Synced ' + processed + ' scan(s)', 'success');
        // Reload task lists to reflect changes
        loadPutawayTasks();
        loadPickTasks();
      }

      updateOnlineStatus();
    } catch (_) {
      updateOnlineStatus();
    }
  }

  function updateOnlineStatus() {
    const online = navigator.onLine;
    if (online) {
      statusBadge.textContent = 'Online';
      statusBadge.className = 'header-badge';
    } else {
      statusBadge.textContent = 'Offline';
      statusBadge.className = 'header-badge offline';
    }
    updateQueueBadge();
  }

  /* ============================== Utility ============================== */
  function escHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ============================== Init ============================== */
  // Load putaway tasks on start
  loadPutawayTasks();
  updateOnlineStatus();

  // Process any queued scans from a previous session
  setTimeout(() => processQueue(), 2000);

  // Focus lookup input when switching to lookup tab
  // (handled in tab click handler)

  /* ============================== Online / Offline Events ============================== */
  window.addEventListener('online', () => {
    updateOnlineStatus();
    showToast('📡 Connection restored — syncing…', 'success');
    processQueue();
  });

  window.addEventListener('offline', () => {
    updateOnlineStatus();
    showToast('📡 No connection — scans will be queued', 'error');
  });

  /* ============================== Pick Warehouse Filter ============================== */
  const pickWarehouseInput = $('#pick-warehouse');
  const pickFilterBtn = $('#pick-filter-btn');
  const pickClearBtn = $('#pick-clear-btn');

  pickFilterBtn.addEventListener('click', () => {
    pickWarehouseFilter = pickWarehouseInput.value.trim();
    loadPickTasks();
  });

  pickClearBtn.addEventListener('click', () => {
    pickWarehouseInput.value = '';
    pickWarehouseFilter = '';
    loadPickTasks();
  });

  pickWarehouseInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      pickFilterBtn.click();
    }
  });

})();
</script>
</body>
</html>
