<!-- Background Shader -->
<!-- STITCH_SHADER_START:ANIMATION_1 class="fixed inset-0 w-full h-full -z-10" -->
<div class="fixed inset-0 w-full h-full -z-10" style="display:block;">
<canvas id="shader-canvas-ANIMATION_1" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_1');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    
    // Slow moving diagonal waves
    float wave = sin(uv.x * 10.0 + uv.y * 5.0 + u_time * 0.5) * 0.5 + 0.5;
    float wave2 = sin(uv.y * 8.0 - uv.x * 4.0 + u_time * 0.3) * 0.5 + 0.5;
    
    // Mix deep navy and charcoal
    vec3 color1 = vec3(0.058, 0.09, 0.165); // Charcoal #0f172a
    vec3 color2 = vec3(0.117, 0.16, 0.231); // Navy #1e293b
    
    vec3 finalColor = mix(color1, color2, wave * wave2);
    
    // Add subtle electric blue 'data' lines
    float line = step(0.995, fract(uv.y * 20.0 + u_time * 0.1));
    finalColor += line * vec3(0.23, 0.51, 0.96) * 0.2;
    
    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<div class="fixed top-20 left-1/2 -translate-x-1/2 w-full max-w-[400px] px-4 space-y-2 z-[60]" id="toast-container"></div>
<script>
        // Tab Navigation Logic
        const navItems = {
            'nav-putaway': 'putaway-panel',
            'nav-pick': 'pick-panel',
            'nav-lookup': 'lookup-panel'
        };

        Object.keys(navItems).forEach(navId => {
            document.getElementById(navId).addEventListener('click', () => {
                // Update UI state
                Object.keys(navItems).forEach(id => {
                    const btn = document.getElementById(id);
                    const panel = document.getElementById(navItems[id]);
                    
                    if (id === navId) {
                        btn.classList.add('text-secondary', 'border-t-2', 'border-secondary');
                        btn.classList.remove('text-on-surface-variant');
                        panel.classList.add('active');
                        // Find and focus the first input in the panel
                        const firstInput = panel.querySelector('input');
                        if (firstInput) firstInput.focus();
                    } else {
                        btn.classList.remove('text-secondary', 'border-t-2', 'border-secondary');
                        btn.classList.add('text-on-surface-variant');
                        panel.classList.remove('active');
                    }
                });
            });
        });

        // Toast Logic
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-secondary/90 border-secondary text-on-secondary',
                error: 'bg-error-container/90 border-error text-on-error-container',
                info: 'bg-primary-container/90 border-primary text-on-primary-container'
            };

            const icons = {
                success: 'check_circle',
                error: 'error',
                info: 'info'
            };

            toast.className = `toast flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-2xl ${colors[type]}`;
            toast.innerHTML = `
                <span class="material-symbols-outlined">${icons[type]}</span>
                <span class="font-semibold">${message}</span>
            `;

            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Functional Handlers
        document.getElementById('putaway-confirm-btn').addEventListener('click', () => {
            const bin = document.getElementById('putaway-bin-input').value;
            const sku = document.getElementById('putaway-sku-input').value;

            if (!bin || !sku) {
                showToast('Please scan both Bin and SKU', 'error');
                return;
            }

            showToast(`SKU ${sku} successfully put away in ${bin}`);
            document.getElementById('putaway-bin-input').value = '';
            document.getElementById('putaway-sku-input').value = '';
            document.getElementById('putaway-bin-input').focus();
        });

        document.getElementById('pick-complete-btn').addEventListener('click', () => {
            const sku = document.getElementById('pick-sku-input').value;
            if (!sku) {
                showToast('Scan SKU to confirm pick', 'error');
                return;
            }
            showToast('Item Picked. Proceed to B-12-09-03');
            document.getElementById('pick-sku-input').value = '';
        });

        document.getElementById('lookup-search-btn').addEventListener('click', () => {
            const query = document.getElementById('lookup-search-input').value;
            if (!query) return;

            const results = document.getElementById('lookup-results');
            results.innerHTML = `
                <div class="glass-panel p-4 rounded-xl border-l-4 border-l-primary animate-fadeIn">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-on-surface">SKU: ${query}</h3>
                        <span class="px-2 py-0.5 bg-secondary/10 text-secondary text-[10px] rounded border border-secondary/20">IN STOCK</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div>
                            <p class="text-[10px] text-on-surface-variant uppercase">Current Bin</p>
                            <p class="font-data-mono">A-402-01</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-on-surface-variant uppercase">Quantity</p>
                            <p class="font-data-mono">1,240 EA</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // Listen for "Enter" key on all inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const btnId = input.id.split('-')[0] + (input.id.includes('lookup') ? '-search-btn' : '-confirm-btn');
                    const targetBtn = document.getElementById(btnId) || document.getElementById('pick-complete-btn');
                    if (targetBtn) targetBtn.click();
                }
            });
        });

        // Micro-interaction: Focus effect on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('putaway-bin-input').focus();
        });
    </script>
